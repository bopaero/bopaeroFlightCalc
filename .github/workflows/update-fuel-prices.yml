name: Update Aviation Fuel Prices

on:
  schedule:
    # Run daily at 7am UTC
    - cron: '0 7 * * *'
  workflow_dispatch: # Allow manual trigger

jobs:
  update-fuel:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Fetch national average fuel prices from AirNav
        run: |
          python3 -c "
          import urllib.request, re, json, datetime

          url = 'https://www.airnav.com/fuel/report.html'
          req = urllib.request.Request(url, headers={'User-Agent': 'Mozilla/5.0'})
          html = urllib.request.urlopen(req).read().decode('utf-8')

          rows = re.findall(r'<TR[^>]*>(.*?)</TR>', html, re.S|re.I)
          for row in rows:
              cells = re.findall(r'<T[DH][^>]*>(.*?)</T[DH]>', row, re.S|re.I)
              clean = [re.sub(r'<[^>]+>', '', c).strip() for c in cells]
              if clean and clean[0] == 'Nationwide':
                  # Columns: Region, FBOs_100LL, FBOs_reporting, 100LL_Avg, 100LL_Min, 100LL_Max,
                  #          FBOs_JetA, JetA_Avg, JetA_Min, JetA_Max, ...
                  avgas_avg = float(clean[3].replace('\$',''))
                  jeta_avg = float(clean[7].replace('\$',''))

                  data = {
                      'updated': datetime.datetime.utcnow().strftime('%Y-%m-%d'),
                      'source': 'AirNav.com',
                      'avgas_100ll': avgas_avg,
                      'jet_a': jeta_avg
                  }

                  with open('data/fuel_prices.json', 'w') as f:
                      json.dump(data, f, indent=2)

                  print(f'100LL: \${avgas_avg}/gal, Jet-A: \${jeta_avg}/gal')
                  break
          else:
              print('ERROR: Could not find Nationwide row')
              exit(1)
          "

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/fuel_prices.json
          if git diff --cached --quiet; then
            echo "No changes to fuel prices"
          else
            git commit -m "Update fuel prices — $(date -u +%Y-%m-%d)"
            git push
          fi
